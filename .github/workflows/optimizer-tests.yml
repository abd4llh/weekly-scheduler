name: Optimizer tests

on:
  push:
    branches:
      - feature/v0.12-optimizer-foundation
  pull_request:
    paths:
      - "app.py"
      - "ai_parser.py"
      - "models.py"
      - "domain/**"
      - "optimizer/**"
      - "tests/**"
      - "requirements*.txt"
      - ".github/workflows/optimizer-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -q -r requirements-dev.txt

      - name: Compile application and optimizer modules
        run: python -m compileall -q app.py ai_parser.py models.py domain optimizer tests tools

      - name: Run tests
        id: pytest
        shell: bash
        run: |
          set +e
          PYTHONPATH=. pytest -q tests > pytest-output.txt 2>&1
          code=$?
          cat pytest-output.txt
          exit $code

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: optimizer-pytest-output
          path: pytest-output.txt
          if-no-files-found: error
