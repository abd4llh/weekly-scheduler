name: Optimizer tests

on:
  push:
    branches:
      - feature/v0.12-optimizer-foundation
  pull_request:
    paths:
      - "domain/**"
      - "optimizer/**"
      - "tests/**"
      - "requirements*.txt"
      - ".github/workflows/optimizer-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile optimizer modules
        run: python -m compileall -q domain optimizer tests

      - name: Run tests
        run: pytest -q
